  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e2a;
      --bg2: #0d1235;
      --card: #1a1f42;
      --card2: #222748;
      --border: #2e3566;
      --red: #c0392b;
      --red-dark: #922b21;
      --red-light: #e74c3c;
      --text: #ffffff;
      --text-muted: #8892b0;
      --text-dim: #6c7a99;
      --green: #27ae60;
      --accent: #3b5bdb;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* App shell – centred mobile-width column */
    #app {
      min-height: 100vh;
      min-height: 100dvh; /* modern mobile-safe viewport height */
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      background: radial-gradient(ellipse at top right, #1a1060 0%, #0a0e2a 55%, #07081a 100%);
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 8px;
      position: relative;
    }
    .header .back-btn {
      background: none; border: none; color: #fff; font-size: 22px;
      cursor: pointer; padding: 4px 8px; opacity: 0.8;
      transition: opacity 0.2s;
    }
    .header .back-btn:hover { opacity: 1; }
    .header .back-btn.hidden { opacity: 0; pointer-events: none; }
    .header .logo {
      display: flex; align-items: center; gap: 8px;
    }
    .header .logo .logo-icon {
      width: 36px; height: 36px; border-radius: 8px;
      overflow: hidden; flex-shrink: 0;
    }
    .header .logo .logo-icon img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .header .logo span { font-weight: 700; font-size: 15px; }
    .header .counter { font-size: 15px; font-weight: 600; color: #ccc; min-width: 44px; text-align: right; }
    .header .counter.hidden { opacity: 0; }

    /* progress bar */
    .progress-bar-wrap {
      height: 4px; background: #2e3566; margin: 4px 0 0;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--red-dark), var(--red-light));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── SCREEN ── */
    .screen {
      flex: 1; display: flex; flex-direction: column;
      padding: 24px 20px 0;
      padding-bottom: 100px; /* space for sticky footer */
      animation: fadeSlide 0.35s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .screen-title {
      font-size: 22px; font-weight: 800; line-height: 1.35;
      margin-bottom: 24px; text-align: center;
    }
    .screen-title.left { text-align: left; }
    .screen-subtitle {
      font-size: 14px; color: var(--text-muted); text-align: center;
      margin-top: -16px; margin-bottom: 20px;
    }

    /* ── OPTION BUTTONS ── */
    .options { display: flex; flex-direction: column; gap: 12px; }

    .option-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      padding: 18px 20px;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      text-align: left;
      transition: background 0.18s, border-color 0.18s, transform 0.12s;
      position: relative;
      overflow: hidden;
    }
    .option-btn:active { transform: scale(0.98); }
    .option-btn:hover { background: var(--card2); border-color: #4a56a0; }
    .option-btn.selected {
      background: #1c244f;
      border-color: var(--red);
    }
    .option-btn .emoji {
      width: 40px; height: 40px; border-radius: 10px;
      background: #0f1535;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .option-btn .check-circle {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid var(--text-dim); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      margin-left: auto;
      transition: background 0.2s, border-color 0.2s;
    }
    .option-btn.selected .check-circle {
      background: var(--red); border-color: var(--red);
    }
    .option-btn .check-circle::after {
      content: ''; display: none;
      width: 6px; height: 10px;
      border: 2px solid white; border-top: none; border-left: none;
      transform: rotate(45deg) translateY(-1px);
    }
    .option-btn.selected .check-circle::after { display: block; }

    /* ── SCALE ── */
    .scale-wrap { margin-top: 8px; }
    .scale-labels { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .scale-buttons { display: flex; gap: 8px; }
    .scale-btn {
      flex: 1; padding: 16px 0; border-radius: 12px;
      background: var(--card); border: 1.5px solid var(--border);
      color: var(--text); font-size: 16px; font-weight: 700;
      cursor: pointer; text-align: center;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
    }
    .scale-btn:active { transform: scale(0.95); }
    .scale-btn:hover { background: var(--card2); }
    .scale-btn.selected { background: var(--red); border-color: var(--red); }

    /* ── INFO CARD ── */
    .info-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .info-card p { font-size: 14px; line-height: 1.6; color: #c8d0e8; }
    .info-card .stat-row {
      display: flex; gap: 12px; align-items: center;
      background: #11163a; border-radius: 12px; padding: 14px 16px;
    }
    .info-card .stat-icon { font-size: 28px; }
    .info-card .stat-text strong { display: block; font-size: 18px; font-weight: 800; }
    .info-card .stat-text span { font-size: 13px; color: var(--text-muted); }

    /* ── PROGRESS CARDS (Day 1, 14, 24) ── */
    .day-cards { display: flex; flex-direction: column; gap: 12px; }
    .day-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .day-card .day-orb {
      width: 60px; height: 60px; border-radius: 50%; flex-shrink: 0;
      background: radial-gradient(circle at 40% 40%, #7b1010, #2c0606);
      border: 2px solid #5a1515;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }
    .day-card .day-name { font-size: 16px; font-weight: 700; flex: 1; }
    .day-card .day-icon { font-size: 28px; opacity: 0.85; }

    /* ── CHART ── */
    .chart-wrap { margin: 16px 0; padding: 0 4px; }
    .chart-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .chart-svg-wrap { position: relative; }
    .chart-svg-wrap svg { width: 100%; display: block; }
    .chart-multiplier {
      position: absolute; right: 16px; top: 20%; 
      font-size: 42px; font-weight: 900; color: white;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }
    .chart-arrow {
      position: absolute; right: 18px; top: 22%;
      margin-top: -24px; font-size: 32px; color: rgba(255,255,255,0.6);
    }
    .chart-weeks { display: flex; justify-content: space-between; padding: 0 20px; }
    .chart-weeks span { font-size: 11px; color: var(--text-muted); font-style: italic; }

    /* ── LEADERBOARD ── */
    .leaderboard { display: flex; flex-direction: column; gap: 10px; }
    .leader-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .leader-row .rank { font-size: 18px; font-weight: 800; width: 24px; text-align: center; }
    .leader-row .avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, #3b5bdb, #5c35ac);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .leader-row .lname { flex: 1; font-weight: 600; font-size: 14px; }
    .leader-row .lscore { font-size: 13px; color: var(--text-muted); }
    .leader-row .lbadge {
      font-size: 12px; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; background: linear-gradient(135deg, #922b21, #c0392b);
    }

    /* ── TESTIMONIALS ── */
    .testimonials-row { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
    .testimonials-row::-webkit-scrollbar { height: 0; }
    .testimonial-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; min-width: 220px; max-width: 240px;
      flex-shrink: 0;
    }
    .testimonial-card .stars { color: #27ae60; font-size: 13px; letter-spacing: 2px; margin-bottom: 6px; }
    .testimonial-card .t-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .testimonial-card .t-body { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
    .testimonial-card .t-author { display: flex; align-items: center; gap: 8px; }
    .testimonial-card .t-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
    }
    .testimonial-card .t-name { font-size: 12px; color: var(--text-muted); }
    .testimonial-card .read-more { margin-left: auto; color: #5b8dee; font-size: 11px; font-weight: 600; cursor: pointer; }

    /* ── TRUST SCREEN ── */
    .trust-wrap { text-align: center; }
    .trust-number { font-size: 48px; font-weight: 900; color: var(--red-light); }
    .trust-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .trust-method { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
    .store-ratings { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
    .store-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 20px; text-align: center; flex: 1;
    }
    .store-card .store-icon { font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .store-card .store-rating { font-size: 24px; font-weight: 800; display: inline; }
    .store-card .store-stars { color: #f59e0b; font-size: 14px; letter-spacing: 1px; }
    .store-card .store-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .trust-hero { width: 100%; max-height: 180px; object-fit: cover; border-radius: 16px; margin-top: 8px; }

    /* ── RESULTS REVEAL ── */
    .results-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; }
    .score-circle { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 16px; border: 4px solid var(--red); display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .score-circle .score-val { font-size: 36px; font-weight: 900; }
    .score-circle .score-of { font-size: 12px; color: var(--text-muted); }
    .score-label { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; }
    .results-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .results-row:last-child { border-bottom: none; }
    .results-row .rr-label { color: var(--text-muted); }
    .results-row .rr-val { font-weight: 700; }
    .results-rec { background: #11163a; border-radius: 12px; padding: 16px; margin-top: 16px; text-align: left; }
    .results-rec .rec-title { font-size: 13px; font-weight: 700; color: var(--green); margin-bottom: 6px; }
    .results-rec p { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

    /* ── OFFER PAGE ── */
    .offer-timer-bar {
      background: linear-gradient(135deg, #0d1235, #1a1060);
      border: 1px solid var(--border); border-radius: 14px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .offer-timer-bar span:first-child { font-size: 14px; font-weight: 700; }
    .offer-time { font-size: 28px; font-weight: 900; color: #2ecc71; font-variant-numeric: tabular-nums; }
    .offer-section { margin-bottom: 20px; }
    .offer-features { display: flex; flex-direction: column; gap: 14px; }
    .of-row { display: flex; align-items: flex-start; gap: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .of-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .of-row strong { font-size: 14px; }
    .of-desc { font-size: 12px; color: var(--text-muted); }
    .offer-table { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .ot-header, .ot-row { display: grid; grid-template-columns: 1fr 60px 80px; padding: 12px 16px; align-items: center; }
    .ot-header { border-bottom: 1px solid var(--border); font-weight: 700; font-size: 13px; }
    .ot-row { border-bottom: 1px solid #1a1f42; font-size: 13px; }
    .ot-row:last-child { border-bottom: none; }
    .ot-row span:nth-child(2), .ot-row span:nth-child(3), .ot-header span:nth-child(2), .ot-header span:nth-child(3) { text-align: center; }
    .price-card { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 20px; position: relative; cursor: pointer; transition: border-color 0.2s; }
    .price-card.selected { border-color: #2ecc71; }
    .price-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #1abc9c, #2ecc71); color: white; font-size: 11px; font-weight: 800; padding: 4px 14px; border-radius: 20px; letter-spacing: 0.5px; }
    .price-name { font-size: 16px; font-weight: 700; margin-top: 8px; }
    .price-amount { margin-top: 8px; }
    .price-old { text-decoration: line-through; color: var(--text-muted); font-size: 16px; }
    .price-new { font-size: 28px; font-weight: 900; color: #2ecc71; }
    .price-period { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .guarantee-box { background: var(--card); border: 1px solid #2ecc71; border-radius: 16px; padding: 20px; }

    /* ── LOADING / PLAN ── */
    .plan-loading { padding: 20px 0; }
    .plan-bar-wrap { height: 8px; background: #2e3566; border-radius: 4px; margin-bottom: 32px; overflow: hidden; }
    .plan-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red-dark), var(--red-light)); border-radius: 4px; transition: width 0.8s ease; }
    .plan-steps { display: flex; flex-direction: column; gap: 16px; }
    .plan-step { display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: 500; color: var(--text-muted); opacity: 0.4; transition: opacity 0.4s; }
    .plan-step.done { color: var(--text); opacity: 1; }
    .plan-step .step-check {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--card); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: background 0.4s, border-color 0.4s;
    }
    .plan-step.done .step-check { background: var(--green); border-color: var(--green); }

    /* ── EMAIL SCREEN ── */
    .email-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
    }
    .email-input {
      width: 100%; padding: 16px 18px;
      background: #11163a; border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 15px;
      font-family: inherit; outline: none; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .email-input::placeholder { color: var(--text-dim); }
    .email-input:focus { border-color: var(--red); }
    .email-privacy { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .email-privacy .pi { font-size: 18px; flex-shrink: 0; }
    .email-privacy a { color: #5b8dee; }
    .email-note { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.6; margin-top: 16px; }

    /* ── CONTINUE BTN ── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom, 0px));
      background: linear-gradient(to top, #0a0e2a 70%, rgba(10,14,42,0.95) 85%, transparent);
      z-index: 50;
    }
    .btn-continue {
      width: 100%; padding: 20px;
      background: linear-gradient(135deg, var(--red-dark), var(--red-light));
      border: none; border-radius: 16px;
      color: white; font-size: 17px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.2s, transform 0.12s;
      box-shadow: 0 4px 20px rgba(192,57,43,0.35);
    }
    .btn-continue:hover { opacity: 0.92; }
    .btn-continue:active { transform: scale(0.97); }

    /* ── HINT ROW ── */
    .hint-row {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; color: var(--text-muted); margin-top: 20px; line-height: 1.5;
    }
    .hint-row .hi { font-size: 16px; opacity: 0.6; flex-shrink: 0; }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    #modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--card2); border: 1px solid var(--border);
      border-radius: 20px; padding: 28px 24px; max-width: 340px; width: 90%;
      text-align: center;
      transform: scale(0.9); transition: transform 0.25s;
    }
    #modal-overlay.show .modal-box { transform: scale(1); }
    .modal-box .modal-lead { font-size: 14px; color: var(--text-muted); margin-bottom: 12px; }
    .modal-box .modal-q { font-size: 20px; font-weight: 800; margin-bottom: 24px; line-height: 1.35; }
    .modal-btns { display: flex; gap: 12px; }
    .modal-btn {
      flex: 1; padding: 16px; border-radius: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      font-family: inherit; border: none;
      transition: opacity 0.15s, transform 0.12s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .modal-btn:active { transform: scale(0.96); }
    .modal-btn.no { background: white; color: #1a1f42; }
    .modal-btn.yes { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }

    /* ── SUCCESS ── */
    .success-hero {
      text-align: center; padding: 32px 0;
    }
    .success-hero .success-icon { font-size: 64px; margin-bottom: 16px; display: block; }
    .success-hero h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
    .success-hero p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ── UPSELL / DOWNSELL ── */
    .upsell-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 20px; position: relative; overflow: visible;
    }
    .upsell-badge {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white; font-size: 11px; font-weight: 800;

  fill.style.width = pct + '%';

  const hideNav = ['loading','email','results','offer','upsell','downsell','thankyou'];
  if (hideNav.includes(q.type)) {
    counter.classList.add('hidden');
    backBtn.classList.add('hidden');

    counter.classList.remove('hidden');
    backBtn.classList.remove('hidden');
    counter.textContent = (step + 1) + '/' + TOTAL;
  }

  let footerHtml = '';

    case 'single': html = renderSingle(q); break;
    case 'multi':  html = renderMulti(q); break;
    case 'scale':  html = renderScale(q); break;
    case 'info-days': html = renderInfoDays(q); footerHtml = continueBtn(); break;
    case 'info-chart': html = renderInfoChart(q); footerHtml = continueBtn(); break;
    case 'leaderboard': html = renderLeaderboard(q); footerHtml = continueBtn(); break;

}

function selectSingle(i) {
  answers[step] = i;

  setTimeout(advance, 380);
}

function renderMulti(q) {
  multiSelected = new Set();

      <div class="emoji" style="margin-left:4px">${o.emoji}</div>
      <span style="flex:1">${o.label}</span>

  return `<div class="screen-title">${q.title}</div>
    <div class="screen-subtitle">${q.subtitle}</div>

}

function toggleMulti(i, isNone) {
  const q = questions[step];
  if (isNone) {
    multiSelected.clear();
    multiSelected.add(i);
  } else {
    multiSelected.delete(0); // remove "None"
    if (multiSelected.has(i)) multiSelected.delete(i);
    else multiSelected.add(i);
  }
  q.options.forEach((_, idx) => {
    const btn = document.getElementById('opt-' + idx);
    btn.classList.toggle('selected', multiSelected.has(idx));
    const chk = document.getElementById('chk-' + idx);
    chk.style.background = multiSelected.has(idx) ? 'var(--red)' : '';
    chk.style.borderColor = multiSelected.has(idx) ? 'var(--red)' : '';
  });
  // show continue
  if (!document.getElementById('footer-wrap').querySelector('.btn-continue')) {
    document.getElementById('footer-wrap').innerHTML = continueBtn();
  }
}

  const milestones = [25, 50, 75, 100];
  for (let i = 0; i < q.steps.length; i++) {
    await sleep(1000);
    if (!bar) return;
    bar.style.width = milestones[i] + '%';
    const step_el = document.getElementById('plan-step-' + i);
    if (step_el) step_el.classList.add('done');
    // Show modals mid-way
    if (i === 1 && modalQueue.length > 0) {
      await showModal(modalQueue.shift());
    }
    if (i === 2 && modalQueue.length > 0) {
      await showModal(modalQueue.shift());
    }
  }
  await sleep(600);
  const btn = document.getElementById('continue-loading');
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'all'; btn.innerHTML = 'Continue'; }
}

// ─── TRACKING EVENTS ────────────────────────────────
function trackEvent(eventName, params = {}) {
  // Generate unique event ID for deduplication (browser + CAPI)
  const eventId = eventName + '_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
  console.log('📊 Track:', eventName, params, 'eventID:', eventId);
  // Meta Pixel — with eventID for CAPI deduplication
  if (typeof fbq !== 'undefined') {
    try { fbq('track', eventName, params, { eventID: eventId }); } catch(e) {}
  }
  // GA4
  if (typeof gtag !== 'undefined') {
    try { gtag('event', eventName, params); } catch(e) {}
  }
  // Store last event ID for potential CAPI matching
  window._lastEventId = eventId;
}

  const purchaseValues = { premium: 19.97, bundle: 29.97, starter: 9.97 };
  trackEvent('Purchase', {
    value: purchaseValues[purchaseType] || 19.97,
    currency: 'USD',
    content_name: purchaseType,
    content_ids: [purchaseType],
    content_type: 'product',
    num_items: 1
  });

  // Stage 2: Create protocol + activate customer
  const savedQuiz = JSON.parse(localStorage.getItem('pf_quiz') || '{}');
  if (savedQuiz.email) {
    fetch('/api/create-protocol', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: savedQuiz.email,
        goal: savedQuiz.goal,
        experience: savedQuiz.experience,
        score: savedQuiz.score,
        tier: purchaseType,
        quizAnswers: savedQuiz.answers,
        eventId: window._lastEventId || null,  // Pass to server for Meta CAPI deduplication
      })
    })
    .then(r => r.json())
    .then(data => {
      console.log('✅ Protocol created:', data);
      window._protocolUrl = data.accessUrl;
      // Save profile to localStorage for the dashboard to use
      if (data.token) {
        localStorage.setItem(`pf_profile_${data.token}`, JSON.stringify({
          plan: data.plan || 'firmness',
          tier: data.tier || purchaseType,
          createdAt: new Date().toISOString(),
        }));
      }
      // Re-render thank you page to include the link
      if (questions[step]?.type === 'thankyou') renderStep();
    })
    .catch(err => console.error('❌ Protocol creation failed:', err));
  }

  if (purchaseType === 'premium') {
    goToScreen('upsell');
  } else {
    goToScreen('thankyou');
  }
} else {
  renderStep();
  pushStepHistory(); // Initial history entry
}
setupExitIntent();
</script>
</body>
</html>
